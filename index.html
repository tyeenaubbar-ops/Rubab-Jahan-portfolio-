<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubab | Graphic Design Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    text-align:center;
    padding:70px 20px;
}

header h1{
    font-size:50px;
}

header p{
    color:#ddd;
    margin-top:10px;
    font-size:18px;
}

.gallery{
    width:90%;
    max-width:1200px;
    margin:50px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.card img{
    width:100%;
    height:300px;
    object-fit:contain;
    background:#111827;
    cursor:pointer;
}

.card h3{
    padding:15px 15px 5px;
}

.card p{
    padding:0 15px 20px;
    color:#bbb;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.95);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal img{
    max-width:95%;
    max-height:95%;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<p>Graphic Designer | Portfolio</p>
</header>

<div id="imageModal" class="modal" onclick="closeModal()">

</div>

<script>
const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImg");

document.querySelectorAll(".card img").forEach(img=>{
    img.addEventListener("click",()=>{
        modal.style.display="flex";
        modalImg.src=img.src;
    });
});

function closeModal(){
    modal.style.display="none";
}
</script>
